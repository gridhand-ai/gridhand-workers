version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
      timezone: America/Chicago
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
    ignore:
      - dependency-name: '@anthropic-ai/sdk'
        update-types: ['version-update:semver-major']
